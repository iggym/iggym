
<svg width="1200" height="260" viewBox="0 0 1200 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient background (Apple × Stripe × Airbnb) -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="50%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>

    <!-- Subtle moving highlight -->
    <linearGradient id="shineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(255,255,255,0)" />
      <stop offset="50%" stop-color="rgba(255,255,255,0.45)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>

    <clipPath id="roundedClip">
      <rect x="40" y="40" width="1120" height="180" rx="32" ry="32" />
    </clipPath>
  </defs>

  <!-- Background card -->
  <rect x="40" y="40" width="1120" height="180" rx="32" ry="32" fill="url(#bgGradient)" />

  <!-- Animated shine sweep -->
  <rect x="-400" y="40" width="400" height="180" fill="url(#shineGradient)" clip-path="url(#roundedClip)">
    <animate attributeName="x" from="-400" to="1200" dur="4s" repeatCount="indefinite" />
  </rect>

  <!-- Top label -->
  <text x="600" y="85" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
        font-size="18" fill="#E5E7EB" letter-spacing="4">
    IGGY M. · AI SYSTEMS ARCHITECT
  </text>

  <!-- Main tagline -->
  <text x="600" y="140" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif"
        font-size="30" fill="#F9FAFB" font-weight="600">
    I BUILD MACHINES THAT BUILD SOFTWARE.
  </text>

  <!-- Subline -->
  <text x="600" y="175" text-anchor="middle" font-family="system-ui, -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif"
        font-size="18" fill="#E5E7EB">
    Autonomous systems · Software factories · Enterprise‑grade AI infrastructure
  </text>
</svg>
